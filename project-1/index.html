<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossy Voxel - Tron Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050a14; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            z-index: 10;
        }
        #score-display {
            color: #ffffff;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
        }
        #shield-status {
            color: #00f3ff;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00f3ff;
            margin-top: -5px;
        }
        #flow-meter-container {
            width: 200px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }
        #flow-meter-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00f3ff);
            transition: width 0.3s ease;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 10;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 10, 20, 0.95);
            color: white;
            padding: 40px;
            border-radius: 0;
            text-align: center;
            display: none;
            z-index: 20;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255,0,255,0.4);
        }
        #game-over h1 { margin: 0; color: #ff00ff; font-size: 48px; letter-spacing: 5px; }
        #game-over p { font-size: 18px; color: #00f3ff; margin: 15px 0; }
        button {
            background: transparent;
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 12px 25px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }
        button:hover { background: #ff00ff; color: white; box-shadow: 0 0 20px #ff00ff; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="score-display">0</div>
        <div id="shield-status">SOVEREIGN SHIELD ACTIVE</div>
        <div id="flow-meter-container">
            <div id="flow-meter-fill"></div>
        </div>
    </div>
    <div id="instructions">Shield Active until Score 200 | REBOOT to Resume at Safe Sector</div>
    
    <div id="game-over">
        <h1 id="death-title">DE-RESSED</h1>
        <p id="death-reason">System Fault Detected</p>
        <p id="final-score">SCORE: 0</p>
        <button id="restart-btn" onclick="resetGame()">RESTORE SYSTEM (ENTER)</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const GRID_SIZE = 1;
        const MOVE_DURATION = 0.12; 
        const BOARD_WIDTH = 23; 
        const VISIBLE_LANES = 25;
        const LANE_WIDTH = 25; 
        const SPAWN_BOUND = 22; 
        const CLEANUP_DISTANCE = 10;
        const IDLE_LIMIT = 15000; 
        const CAMERA_ZOOM = 8.5;
        const MOUNTAIN_THRESHOLD = 200;

        let scene, camera, renderer, player, eagle, playerShield;
        let score = 0, highestZ = 0, isMoving = false, isDead = false;
        let idleTimer = Date.now(), flowNotes = 0, isFlowState = false, isSovereignShield = true;
        
        let trees = [], lanes = [], cars = [], logs = [], particles = [], notes = [], mountainBlocks = [], sentinels = [];

        const LaneType = { GRASS: 'grass', ROAD: 'road', WATER: 'water', MOUNTAIN: 'mountain' };
        const CyberColors = {
            GRASS: 0x002a00, GRASS_GLOW: 0x00ff41,
            ROAD: 0x111111, ROAD_GLOW: 0xffffff, 
            SHIP_OPTIONS: [0xff8800, 0xff00ff, 0x00ff41, 0xff0000], 
            WATER: 0x001133, WATER_GLOW: 0x0077ff,
            PLAYER: 0x333333, PLAYER_GLOW: 0xff00ff,
            SHIELD: 0x00f3ff,
            NOTE: 0x444400, NOTE_GLOW: 0xffff00,
            MOUNTAIN: 0x220033, MOUNTAIN_GLOW: 0xff00ff,
            STATIC_MTN: 0x110022,
            SENTINEL_GLOW: 0xff0000,
            GHOST_GLOW: 0xffffff
        };

        // --- AUDIO ENGINE ---
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSynth(freq, type, duration, volume = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq / 4, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            jump: () => playSynth(300, 'square', 0.1, 0.1),
            land: () => playSynth(100, 'sine', 0.05, 0.1),
            splash: () => playSynth(150, 'sawtooth', 0.3, 0.05),
            death: () => playSynth(60, 'sawtooth', 0.8, 0.2),
            note: () => playSynth(1200, 'sine', 0.2, 0.1),
            flow: () => { playSynth(440, 'square', 0.1, 0.1); playSynth(880, 'square', 0.3, 0.1); }
        };

        function createVectorMesh(geometry, fillColor, outlineColor, emissiveIntensity = 1.0, gridType = 'NONE') {
            const group = new THREE.Group();
            const fillMat = new THREE.MeshStandardMaterial({ 
                color: fillColor, 
                roughness: 0, 
                metalness: 0.9,
                emissive: outlineColor,
                emissiveIntensity: emissiveIntensity * 0.25 
            });
            const mesh = new THREE.Mesh(geometry, fillMat);
            group.add(mesh);

            const edges = new THREE.EdgesGeometry(geometry);
            const lineMat = new THREE.LineBasicMaterial({ color: outlineColor, transparent: true, opacity: 0.9 });
            const outline = new THREE.LineSegments(edges, lineMat);
            group.add(outline);

            if (gridType !== 'NONE') {
                const boxParams = geometry.parameters;
                const width = boxParams.width;
                const gridPoints = [];
                const lineCount = gridType === 'ROAD' ? 12 : (gridType === 'WATER' ? 8 : 6);
                const yPos = boxParams.height ? boxParams.height/2 + 0.01 : 0.251; 
                
                if (gridType === 'ROAD' || gridType === 'GRASS' || gridType === 'MOUNTAIN') {
                    for (let i = 0; i <= lineCount; i++) {
                        const x = -width/2 + (width * (i / lineCount));
                        gridPoints.push(new THREE.Vector3(x, yPos, -0.5));
                        gridPoints.push(new THREE.Vector3(x, yPos, 0.5));
                    }
                }
                
                if (gridType === 'ROAD' || gridType === 'WATER' || gridType === 'MOUNTAIN') {
                    const latCount = gridType === 'ROAD' ? 4 : 8;
                    for (let i = 0; i <= latCount; i++) {
                        const z = -0.5 + (i / latCount);
                        gridPoints.push(new THREE.Vector3(-width/2, yPos, z));
                        gridPoints.push(new THREE.Vector3(width/2, yPos, z));
                    }
                }

                const gridGeo = new THREE.BufferGeometry().setFromPoints(gridPoints);
                const gridMat = new THREE.LineBasicMaterial({ color: outlineColor, transparent: true, opacity: 0.6 }); 
                const gridLines = new THREE.LineSegments(gridGeo, gridMat);
                group.add(gridLines);
            }

            group.userData.outline = outline;
            group.userData.mesh = mesh;
            return group;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x02050a);
            scene.fog = new THREE.Fog(0x02050a, 10, 45);

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(-CAMERA_ZOOM * aspect, CAMERA_ZOOM * aspect, CAMERA_ZOOM, -CAMERA_ZOOM, 1, 1000);
            camera.position.set(-10, 10, -10); 
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 0.6); 
            directional.position.set(-5, 10, -5);
            scene.add(directional);

            const gridHelper = new THREE.GridHelper(200, 100, 0xff00ff, 0x002244);
            gridHelper.position.y = -0.51;
            scene.add(gridHelper);

            setupGame(true);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', (e) => { initAudio(); onKeyDown(e); });
            setupTouchControls();
            animate();
        }

        function setupGame(fullReset = false) {
            isMoving = false;
            isDead = false;
            idleTimer = Date.now();
            document.getElementById('game-over').style.display = 'none';

            if (fullReset) {
                score = 0; highestZ = 0; flowNotes = 0; isFlowState = false; isSovereignShield = true;
                document.getElementById('score-display').innerText = "0";
                updateFlowMeter();
                spawnPlayer();
                spawnEagle();
                for (let i = -10; i < VISIBLE_LANES; i++) spawnLane(i);
            } else {
                // Find nearest safe Grass lane behind the current player position
                let currentZ = Math.round(player.position.z);
                let safeZ = currentZ;
                
                // Scan backwards for a grass lane (look up to 15 lanes back for safety)
                for (let i = currentZ; i >= -10; i--) {
                    const l = lanes.find(lane => lane.index === i);
                    if (l && l.type === LaneType.GRASS) {
                        safeZ = i;
                        break;
                    }
                    // Stop scan at 15 lanes to avoid resetting too much progress, but grass is priority
                    if (currentZ - i >= 15) {
                        safeZ = i;
                        break;
                    }
                }

                // Reset player completely to avoid "stuck" state
                player.scale.set(1, 1, 1);
                player.position.set(0, 0, safeZ); // Set to 0 floor initially
                player.rotation.set(0, 0, 0); // Face forward
                playerShield.visible = isSovereignShield;
                
                // Completely reset scavanger state
                eagle.visible = false;
                eagle.position.set(0, 20, -10);
                scene.background = new THREE.Color(0x02050a);
                idleTimer = Date.now(); 
            }
            document.getElementById('shield-status').innerText = isSovereignShield ? "SOVEREIGN SHIELD ACTIVE" : "SHIELD OFFLINE - MOUNTAIN ZONE";
        }

        function spawnPlayer() {
            player = new THREE.Group();
            
            // Primary Geometry
            const bodyGeo = new THREE.BoxGeometry(0.6, 0.7, 0.6);
            const body = createVectorMesh(bodyGeo, CyberColors.PLAYER, CyberColors.PLAYER_GLOW);
            body.position.y = 0.35;
            player.add(body);
            
            const beakGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const beak = createVectorMesh(beakGeo, 0x666666, 0xffffff, 2.0);
            beak.position.set(0, 0.4, 0.35);
            player.add(beak);

            // Ghost Geometry (Visible when occluded)
            const ghostMat = new THREE.MeshBasicMaterial({ 
                color: CyberColors.GHOST_GLOW, 
                depthTest: true, 
                depthFunc: THREE.GreaterDepth, 
                transparent: true, 
                opacity: 0.4 
            });
            
            const bodyGhost = new THREE.Mesh(bodyGeo, ghostMat);
            bodyGhost.position.y = 0.35;
            player.add(bodyGhost);
            
            const beakGhost = new THREE.Mesh(beakGeo, ghostMat);
            beakGhost.position.set(0, 0.4, 0.35);
            player.add(beakGhost);

            // Shield Visual
            const shieldGeo = new THREE.TorusGeometry(0.6, 0.05, 16, 32);
            const shieldMat = new THREE.MeshStandardMaterial({ 
                color: CyberColors.SHIELD, emissive: CyberColors.SHIELD, emissiveIntensity: 2.0, transparent: true, opacity: 0.8
            });
            playerShield = new THREE.Mesh(shieldGeo, shieldMat);
            playerShield.rotation.x = Math.PI / 2;
            playerShield.position.y = 0.35;
            player.add(playerShield);

            scene.add(player);
        }

        function spawnEagle() {
            eagle = createVectorMesh(new THREE.BoxGeometry(1.5, 0.3, 1), 0x333333, 0xff0000, 2.5);
            eagle.scale.set(0.6, 0.6, 0.6); 
            eagle.visible = false;
            scene.add(eagle);
        }

        function spawnLane(index) {
            const isInitial = index <= 2;
            let type;
            if (isInitial) type = LaneType.GRASS;
            else if (score >= MOUNTAIN_THRESHOLD && Math.random() < 0.4) type = LaneType.MOUNTAIN;
            else {
                const r = Math.random();
                if (r < 0.4) type = LaneType.ROAD;
                else if (r < 0.7) type = LaneType.WATER;
                else type = LaneType.GRASS;
            }
            
            let color, glow;
            if(type === LaneType.GRASS) { color = CyberColors.GRASS; glow = CyberColors.GRASS_GLOW; }
            else if(type === LaneType.ROAD) { color = CyberColors.ROAD; glow = CyberColors.ROAD_GLOW; }
            else if(type === LaneType.MOUNTAIN) { color = CyberColors.MOUNTAIN; glow = CyberColors.MOUNTAIN_GLOW; }
            else { color = CyberColors.WATER; glow = CyberColors.WATER_GLOW; }

            const baseType = (type === LaneType.MOUNTAIN && Math.random() < 0.4) ? LaneType.WATER : type;
            const laneGlow = (baseType === LaneType.WATER) ? CyberColors.WATER_GLOW : glow;
            const laneColor = (baseType === LaneType.WATER) ? CyberColors.WATER : color;

            const lane = createVectorMesh(new THREE.BoxGeometry(LANE_WIDTH, 0.5, 1), laneColor, laneGlow, 0.8, baseType.toUpperCase());
            lane.position.set(0, (baseType === LaneType.WATER) ? -0.35 : -0.25, index);
            scene.add(lane);
            lanes.push({ mesh: lane, type: type, index: index, baseType: baseType });

            if (type === LaneType.GRASS) {
                spawnTree(-12, index); spawnTree(12, index);
                if (index > 2) {
                    for (let x = -11; x <= 11; x++) {
                        if (Math.random() > 0.94) spawnTree(x, index);
                        else if (Math.random() > 0.98) spawnNote(x, index);
                    }
                }
            } else if (type === LaneType.ROAD) spawnTraffic(index);
            else if (type === LaneType.WATER) spawnLogs(index);
            else if (type === LaneType.MOUNTAIN) {
                spawnMountainBlocks(index);
                if (baseType === LaneType.WATER) spawnLogs(index);
            }
        }

        function spawnMountainBlocks(z) {
            const count = 7;
            const width = LANE_WIDTH / count;
            for(let i=0; i<count; i++) {
                const isStatic = (i % 3 === 0);
                const h = isStatic ? 1.0 : (1.5 + Math.random() * 2.0);
                const blockColor = isStatic ? CyberColors.STATIC_MTN : CyberColors.MOUNTAIN;
                const blockGlow = isStatic ? 0x9900ff : CyberColors.MOUNTAIN_GLOW;

                const block = createVectorMesh(new THREE.BoxGeometry(width - 0.2, h, 0.9), blockColor, blockGlow, 1.0, 'MOUNTAIN');
                const x = -LANE_WIDTH/2 + (i * width) + width/2;
                const startY = h/2 - 0.2;
                block.position.set(x, startY, z);
                scene.add(block);
                mountainBlocks.push({ mesh: block, z: z, baseH: h, offset: Math.random() * Math.PI, x: x, isStatic: isStatic });
            }
            spawnSentinel(z);
        }

        function spawnSentinel(z) {
            const sentinel = createVectorMesh(new THREE.ConeGeometry(0.25, 0.5, 4), 0x220000, CyberColors.SENTINEL_GLOW, 2.0);
            sentinel.position.set(0, 3, z);
            scene.add(sentinel);
            sentinels.push({ mesh: sentinel, z: z, dir: Math.random() > 0.5 ? 1 : -1, speed: 0.03 + Math.random() * 0.03 });
        }

        function spawnTree(x, z) {
            const tree = createVectorMesh(new THREE.BoxGeometry(0.6, 1.2, 0.6), 0x003300, CyberColors.GRASS_GLOW, 1.5);
            tree.position.set(x, 0.6, z);
            scene.add(tree);
            trees.push({ x, z, mesh: tree });
        }

        function spawnNote(x, z) {
            const note = createVectorMesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), CyberColors.NOTE, CyberColors.NOTE_GLOW, 5.0);
            note.position.set(x, 0.5, z);
            scene.add(note);
            notes.push({ x, z, mesh: note });
        }

        function spawnTraffic(z) {
            const direction = Math.random() > 0.5 ? 1 : -1;
            const speed = 0.05 + Math.random() * 0.12;
            for (let i = 0; i < 1 + Math.floor(Math.random() * 2); i++) {
                const ship = new THREE.Group();
                const glow = CyberColors.SHIP_OPTIONS[Math.floor(Math.random() * CyberColors.SHIP_OPTIONS.length)];
                const hull = createVectorMesh(new THREE.BoxGeometry(1.2, 0.4, 0.5), 0x222222, glow, 2.0);
                ship.add(hull);
                const wing = createVectorMesh(new THREE.BoxGeometry(0.4, 0.1, 0.8), 0x222222, glow, 2.0);
                const lWing = wing.clone(); lWing.position.set(-0.2, 0, 0); ship.add(lWing);
                const rWing = wing.clone(); rWing.position.set(0.2, 0, 0); ship.add(rWing);
                const fin = createVectorMesh(new THREE.BoxGeometry(0.1, 0.3, 0.3), 0x222222, glow, 2.0); fin.position.set(0, 0.3, -0.1); ship.add(fin);
                ship.position.set((Math.random() * (SPAWN_BOUND * 2)) - SPAWN_BOUND, 0.4, z); 
                if (direction < 0) ship.rotation.y = Math.PI;
                scene.add(ship);
                cars.push({ mesh: ship, speed: speed * direction, length: 1.2, z: z });
            }
        }

        function spawnLogs(z) {
            const direction = Math.random() > 0.5 ? 1 : -1;
            const speed = 0.03 + Math.random() * 0.04;
            for (let i = 0; i < 3; i++) {
                const logLen = 4.5 + Math.random() * 1.5;
                const log = createVectorMesh(new THREE.BoxGeometry(logLen, 0.3, 0.8), 0x442200, 0xffaa00, 1.5);
                log.position.set(-SPAWN_BOUND + (i * 15), -0.1, z);
                scene.add(log);
                logs.push({ mesh: log, speed: speed * direction, length: logLen, z: z });
            }
        }

        function createParticles(x, y, z, color) {
            for (let i = 0; i < 8; i++) {
                const p = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(0.1,0.1,0.1)), new THREE.LineBasicMaterial({ color }));
                p.position.set(x, y, z);
                const velocity = { x: (Math.random()-0.5)*0.2, y: Math.random()*0.2, z: (Math.random()-0.5)*0.2 };
                scene.add(p);
                particles.push({ mesh: p, vel: velocity, life: 1.0 });
            }
        }

        function onKeyDown(e) {
            const key = e.key.toLowerCase();
            if (isDead && key === 'enter') return resetGame();
            if (isMoving || isDead) return;
            if (['p','w','arrowup'].includes(key)) move(0, 1);    
            if (['l','s','arrowdown'].includes(key)) move(0, -1);   
            if (['q','a','arrowleft'].includes(key)) move(1, 0);    
            if (['s','d','arrowright'].includes(key)) move(-1, 0);   
        }

        function setupTouchControls() {
            let sx, sy;
            window.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; initAudio(); });
            window.addEventListener('touchend', e => {
                if (isMoving || isDead) return;
                const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
                if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? -1 : 1, 0); else move(0, dy > 0 ? -1 : 1);
                } else move(0, 1);
            });
        }

        function move(dx, dz) {
            const tx = Math.round(player.position.x + dx), tz = Math.round(player.position.z + dz);
            if (Math.abs(tx) > Math.floor(BOARD_WIDTH / 2) || tz < highestZ - 3) return;
            if (trees.some(t => t.x === tx && t.z === tz)) return;

            isMoving = true; idleTimer = Date.now();
            sounds.jump();
            createParticles(player.position.x, 0.1, player.position.z, CyberColors.PLAYER_GLOW);

            if (dx > 0) player.rotation.y = Math.PI / 2;
            else if (dx < 0) player.rotation.y = -Math.PI / 2;
            else if (dz > 0) player.rotation.y = 0;
            else if (dz < 0) player.rotation.y = Math.PI;

            const sx = player.position.x, sz = player.position.z, sy = player.position.y;
            const st = performance.now();

            if (tz > highestZ) {
                highestZ = tz; score++; 
                document.getElementById('score-display').innerText = score;
                if (score >= MOUNTAIN_THRESHOLD && isSovereignShield) {
                    isSovereignShield = false;
                    document.getElementById('shield-status').innerText = "SHIELD OFFLINE - MOUNTAIN ZONE";
                    playerShield.visible = false;
                    playSynth(200, 'sawtooth', 0.5, 0.1); 
                }
                spawnLane(highestZ + VISIBLE_LANES); cleanupWorld();
            }

            function anim() {
                if (isDead) return;
                const t = Math.min((performance.now() - st) / (MOVE_DURATION * 1000), 1);
                player.position.x = sx + (tx - sx) * t;
                player.position.z = sz + (tz - sz) * t;
                player.position.y = sy + (Math.sin(t * Math.PI) * 0.5);
                if (t < 1) requestAnimationFrame(anim);
                else { 
                    player.position.x = tx;
                    player.position.z = tz;
                    isMoving = false; 
                    sounds.land(); 
                }
            }
            anim();
        }

        function collectNote(idx) {
            const n = notes[idx]; scene.remove(n.mesh); notes.splice(idx, 1);
            flowNotes++; sounds.note(); updateFlowMeter();
            if (flowNotes >= 5 && !isFlowState) activateFlowState();
        }

        function updateFlowMeter() { document.getElementById('flow-meter-fill').style.width = (flowNotes / 5 * 100) + "%"; }

        function activateFlowState() {
            isFlowState = true; sounds.flow();
            const oldBg = scene.background;
            scene.background = new THREE.Color(0x220022);
            setTimeout(() => { isFlowState = false; flowNotes = 0; updateFlowMeter(); scene.background = oldBg; }, 5000);
        }

        function cleanupWorld() {
            const th = player.position.z - CLEANUP_DISTANCE;
            const f = (arr) => arr.filter(o => { if ((o.mesh && o.mesh.position.z < th) || (o.z && o.z < th)) { scene.remove(o.mesh || o); return false; } return true; });
            lanes = f(lanes); trees = f(trees); cars = f(cars); logs = f(logs); notes = f(notes);
            mountainBlocks = f(mountainBlocks); sentinels = f(sentinels);
        }

        function checkCollisions() {
            if (isDead) return;
            const px = player.position.x, pz = player.position.z, py = player.position.y;
            notes.forEach((n, i) => { if (Math.abs(n.x - px) < 0.5 && Math.abs(n.z - pz) < 0.5) collectNote(i); });

            if (Math.abs(px) > (LANE_WIDTH / 2)) return gameOver("CONNECTION LOST: OUT OF BOUNDS");

            if (!isFlowState && !isSovereignShield) {
                for(let s of sentinels) {
                    if(Math.abs(s.z - pz) < 0.4) {
                        const dist = Math.sqrt(Math.pow(s.mesh.position.x - px, 2) + Math.pow(s.mesh.position.y - py, 2));
                        if(dist < 0.6) return gameOver("SENTINEL INTERCEPTION");
                    }
                }
                for (let ship of cars) {
                    if (Math.abs(ship.z - pz) < 0.7) {
                        const h = (ship.length / 2) + 0.35;
                        if (px > ship.mesh.position.x - h && px < ship.mesh.position.x + h) return gameOver("HARDWARE COLLISION");
                    }
                }
            }

            const l = lanes.find(ln => ln.index === Math.round(pz));
            if (!isMoving && l) {
                if(l.type === LaneType.MOUNTAIN) {
                    const block = mountainBlocks.find(b => b.z === l.index && Math.abs(b.x - px) < 1.6);
                    if(block) {
                        player.position.y = block.mesh.position.y + block.baseH/2 + 0.05;
                    } else if(l.baseType === LaneType.WATER) {
                        handleWater(px, pz);
                    } else {
                        player.position.y = 0;
                    }
                } else if (l.type === LaneType.WATER) {
                    handleWater(px, pz);
                } else {
                    player.position.y = 0;
                }
            }
        }

        function handleWater(px, pz) {
            let onL = false;
            for (let log of logs) {
                if (Math.abs(log.z - pz) < 0.5) {
                    const h = (log.length / 2) + 0.3;
                    if (px > log.mesh.position.x - h && px < log.mesh.position.x + h) { onL = true; player.position.x += log.speed; break; }
                }
            }
            if (!onL && player.position.y <= 0.2 && !isSovereignShield) { 
                createParticles(px, -0.1, pz, CyberColors.WATER_GLOW); 
                sounds.splash(); 
                gameOver("BUFFER OVERFLOW: DROWNED"); 
            }
        }

        function gameOver(reason) {
            if (isDead) return; isDead = true; sounds.death();
            document.getElementById('death-reason').innerText = reason;
            document.getElementById('final-score').innerText = "RESUMING SCORE: " + score;
            document.getElementById('game-over').style.display = 'block';
            if (reason.includes("BOUNDS")) player.position.y = -5;
            else if (reason.includes("DROWNED")) player.position.y = -0.5;
            else player.scale.y = 0.1;
        }

        function updateEagle() {
            const idle = Date.now() - idleTimer;
            if (idle > IDLE_LIMIT && !isDead) {
                eagle.visible = true;
                const sp = (idle - IDLE_LIMIT) / 1000; 
                eagle.position.set(player.position.x, 10 - (Math.sin(sp * Math.PI) * 9.5), player.position.z - 10 + (sp * 15));
                if (sp > 0.8) { player.position.copy(eagle.position); gameOver("SYSTEM CLEANUP: SCAVENGED"); }
            } else eagle.visible = false;
        }

        function resetGame() { 
            setupGame(false); 
            window.focus(); // Force browser focus to the game window
            document.getElementById('restart-btn').blur(); 
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -CAMERA_ZOOM * aspect; camera.right = CAMERA_ZOOM * aspect;
            camera.top = CAMERA_ZOOM; camera.bottom = -CAMERA_ZOOM;
            camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isDead) {
                const edge = LANE_WIDTH / 2;
                const time = Date.now() * 0.002;

                cars.forEach(o => {
                    o.mesh.position.x += o.speed;
                    if (o.mesh.position.x > SPAWN_BOUND) o.mesh.position.x = -SPAWN_BOUND;
                    if (o.mesh.position.x < -SPAWN_BOUND) o.mesh.position.x = SPAWN_BOUND;
                });

                logs.forEach(o => {
                    o.mesh.position.x += o.speed;
                    if (o.mesh.position.x > SPAWN_BOUND) o.mesh.position.x = -SPAWN_BOUND;
                    if (o.mesh.position.x < -SPAWN_BOUND) o.mesh.position.x = SPAWN_BOUND;
                });

                mountainBlocks.forEach(b => {
                    if (!b.isStatic) {
                        const range = (b.baseH / 2);
                        const wave = Math.sin(time + b.offset) * range;
                        b.mesh.position.y = (b.baseH / 2 - 0.2) + wave - (range/2);
                        if (b.mesh.position.y < -b.baseH / 2) b.mesh.position.y = -b.baseH/2;
                    }
                });

                sentinels.forEach(s => {
                    s.mesh.position.x += s.speed * s.dir;
                    if(Math.abs(s.mesh.position.x) > edge - 2) s.dir *= -1;
                    s.mesh.rotation.y += 0.1;
                    const b = mountainBlocks.find(bl => bl.z === s.z && Math.abs(bl.x - s.mesh.position.x) < 1.8);
                    if(b) s.mesh.position.y = b.mesh.position.y + b.baseH/2 + 0.5;
                });

                if (playerShield && isSovereignShield) {
                    playerShield.rotation.z += 0.05;
                    playerShield.scale.setScalar(1 + Math.sin(Date.now() * 0.01) * 0.05);
                }

                notes.forEach(n => { n.mesh.rotation.y += 0.05; n.mesh.position.y = 0.5 + Math.sin(Date.now()*0.005)*0.1; });
                
                particles.forEach((p, i) => {
                    p.mesh.position.x += p.vel.x; p.mesh.position.y += p.vel.y; p.mesh.position.z += p.vel.z;
                    p.vel.y -= 0.005; p.life -= 0.02; p.mesh.scale.setScalar(p.life);
                    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
                });

                updateEagle(); 
                checkCollisions();

                camera.position.x += (player.position.x - 10 - camera.position.x) * 0.1;
                camera.position.z += (player.position.z - 10 - camera.position.z) * 0.1;
                camera.lookAt(player.position.x, 0, player.position.z);
            }
            renderer.render(scene, camera);
        }
        window.onload = init;
    </script>
</body>
</html>
