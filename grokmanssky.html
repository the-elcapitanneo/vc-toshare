<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITE SKY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:'VT323',monospace; }
        canvas { display:block; }
        #ui-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:10px; height:10px; border:2px solid #0ff; border-radius:50%; mix-blend-mode:difference; pointer-events:none; }
        #top-info, #top-right-info { position:absolute; color:white; text-shadow:2px 2px 2px #000; font-size:18px; }
        #top-info { top:20px; left:20px; }
        #top-right-info { top:20px; right:20px; }
        .btn { background:#0088ff; color:white; border:none; padding:15px 50px; font-size:32px; cursor:pointer; margin-top:30px; box-shadow:0 6px 0 #003366; }
        .btn:hover { background:#00ffff; color:#000; transform:scale(1.05); }
    </style>
</head>
<body>

<div id="start-menu" style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(#112244,#001122);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;color:white;">
    <h1 style="font-size:110px;color:#00ffff;text-shadow:0 0 30px #00ffff;">INFINITE SKY</h1>
    <button class="btn" id="start-btn">BEGIN EXPLORATION</button>
</div>

<div id="loading-screen" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000;color:white;">
    <h1>GENERATING PLANET...</h1>
    <div id="loading-bar" style="width:400px;height:30px;background:#00ffff;margin:30px 0;"></div>
</div>

<div id="ship-overlay" style="position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(0,20,50,0.98),rgba(10,0,40,0.98));display:none;flex-direction:column;align-items:center;justify-content:center;z-index:2000;color:white;">
    <h1 style="font-size:80px;color:#00ffff;">✦ STARSHIP COCKPIT ✦</h1>
    <div style="font-size:42px;color:#4ade80;margin:30px;">CURRENT PLANET: <span id="planet-name-display">VERDANT PRIME</span></div>
    <button id="launch-btn" class="btn">LAUNCH TO NEW PLANET</button>
    <div style="margin-top:60px;font-size:28px;">Press <b>E</b> to exit ship</div>
</div>

<div id="ui-overlay">
    <div id="top-info">
        <div id="planet-ui">Planet: VERDANT PRIME</div>
        <div id="time-ui">Time: 08:00</div>
    </div>
    <div id="top-right-info">
        <div id="holding-label">Holding: Grass</div>
    </div>
    <div id="crosshair"></div>
</div>

<script type="module">
// ==================== RELIABLE VERSION ====================

const BLOCKS = { AIR:0, DIRT:1, ROCK:2, LOG:3, LEAVES:4, GRASS:5 };
const BLOCK_DATA = {
    [BLOCKS.DIRT]: {name:"Dirt",color:0x6b4226},
    [BLOCKS.ROCK]: {name:"Rock",color:0x808080},
    [BLOCKS.GRASS]: {name:"Grass",color:0x348C31},
    [BLOCKS.LOG]: {name:"Log",color:0x5a3e2b},
    [BLOCKS.LEAVES]: {name:"Leaves",color:0x2d5a27}
};

const BIOMES = [
    {name:"VERDANT PRIME", sky:0x87CEEB, grass:0x348C31, treeChance:0.025},
    {name:"CRIMSON WASTELAND", sky:0xFF4500, grass:0x8B0000, treeChance:0.008},
    {name:"AZURE OCEAN", sky:0x00BFFF, grass:0x00AA88, treeChance:0.015}
];

let scene, camera, renderer, clock, ship, inShip = false, currentBiome = BIOMES[0];
let player = { pos: new THREE.Vector3(45, 30, 45) };
let keys = {}, worldData = new Uint8Array(512*512*64);
let terrainGroup;

function getIdx(x,y,z) {
    const ix = Math.floor(x) + 256, iy = Math.floor(y) + 32, iz = Math.floor(z) + 256;
    if (ix<0||ix>=512||iy<0||iy>=64||iz<0||iz>=512) return -1;
    return ix + iz*512 + iy*512*512;
}
function getBlock(x,y,z) { const i = getIdx(x,y,z); return i===-1 ? 0 : worldData[i]; }
function setBlock(x,y,z,t) { const i = getIdx(x,y,z); if(i!==-1) worldData[i] = t; }

function generatePlanet() {
    worldData.fill(0);
    for(let x = -120; x < 120; x++) {
        for(let z = -120; z < 120; z++) {
            const h = Math.floor(12 + Math.sin(x*0.06)*7 + Math.cos(z*0.06)*7);
            for(let y = 0; y <= h; y++) {
                let type = (y === h) ? BLOCKS.GRASS : (y > h-4 ? BLOCKS.DIRT : BLOCKS.ROCK);
                setBlock(x, y, z, type);
            }
            if (Math.random() < currentBiome.treeChance) {
                const th = 5 + Math.floor(Math.random()*3);
                for(let i=0; i<th; i++) setBlock(x, h+1+i, z, BLOCKS.LOG);
                for(let lx=-2;lx<=2;lx++) for(let lz=-2;lz<=2;lz++) {
                    if (Math.random() < 0.6) setBlock(x+lx, h+th+1, z+lz, BLOCKS.LEAVES);
                }
            }
        }
    }
}

function buildTerrain() {
    if (terrainGroup) scene.remove(terrainGroup);
    terrainGroup = new THREE.Group();

    for(let x=-80; x<80; x++) {
        for(let z=-80; z<80; z++) {
            for(let y=0; y<30; y++) {
                const b = getBlock(x, y, z);
                if(b === 0) continue;
                const cube = new THREE.Mesh(
                    new THREE.BoxGeometry(1,1,1),
                    new THREE.MeshLambertMaterial({ color: BLOCK_DATA[b].color })
                );
                cube.position.set(x, y, z);
                terrainGroup.add(cube);
            }
        }
    }
    scene.add(terrainGroup);
}

function createShip() {
    const g = new THREE.Group();
    const hull = new THREE.Mesh(new THREE.CylinderGeometry(2, 3.8, 14, 8), new THREE.MeshPhongMaterial({color:0xaaaaaa, shininess:100}));
    hull.rotation.x = Math.PI / 2;
    g.add(hull);
    const glass = new THREE.Mesh(new THREE.SphereGeometry(2.3, 32, 32), new THREE.MeshPhongMaterial({color:0x00ffff, transparent:true, opacity:0.7}));
    glass.position.y = 2.8;
    g.add(glass);
    scene.add(g);
    return g;
}

async function startGame() {
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('loading-screen').style.display = 'flex';

    scene = new THREE.Scene();
    scene.background = new THREE.Color(currentBiome.sky);
    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(100, 150, 80);
    scene.add(sun);

    generatePlanet();
    buildTerrain();

    ship = createShip();
    ship.position.set(50, 25, 50);

    document.getElementById('loading-screen').style.display = 'none';
    enterShip();
    animate();
}

function enterShip() {
    inShip = true;
    document.getElementById('ship-overlay').style.display = 'flex';
    document.getElementById('planet-name-display').textContent = currentBiome.name;
}

function exitShip() {
    inShip = false;
    document.getElementById('ship-overlay').style.display = 'none';
    player.pos.copy(ship.position.clone().add(new THREE.Vector3(15, 6, 10)));
    document.documentElement.requestPointerLock();
}

async function launchToNewPlanet() {
    document.getElementById('ship-overlay').style.display = 'none';
    document.getElementById('loading-screen').style.display = 'flex';

    currentBiome = BIOMES[Math.floor(Math.random() * BIOMES.length)];

    await new Promise(r => setTimeout(r, 800));

    generatePlanet();
    buildTerrain();
    scene.background = new THREE.Color(currentBiome.sky);
    ship.position.set(50, 25, 50);

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('planet-ui').textContent = `Planet: ${currentBiome.name}`;
    enterShip();
}

// Mouse look
let yaw = 0, pitch = 0;
document.addEventListener('mousemove', e => {
    if (document.pointerLockElement && !inShip) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-1.4, Math.min(1.4, pitch));
        camera.rotation.set(pitch, yaw, 0);
    }
});

document.addEventListener('click', () => {
    if (!inShip && !document.pointerLockElement) document.documentElement.requestPointerLock();
});

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'KeyE') {
        if (inShip) exitShip();
        else if (player.pos.distanceTo(ship.position) < 35) enterShip();
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if (!inShip) {
        const speed = 40 * delta;
        const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
        forward.y = 0; forward.normalize();
        const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
        right.y = 0; right.normalize();

        if (keys['KeyW']) player.pos.addScaledVector(forward, speed);
        if (keys['KeyS']) player.pos.addScaledVector(forward, -speed);
        if (keys['KeyA']) player.pos.addScaledVector(right, -speed);
        if (keys['KeyD']) player.pos.addScaledVector(right, speed);

        player.pos.y = 25;
        camera.position.copy(player.pos);
        camera.position.y += 2;
    } else {
        camera.position.copy(ship.position.clone().add(new THREE.Vector3(0,7,12)));
        camera.lookAt(ship.position.clone().add(new THREE.Vector3(0,4,40)));
    }

    renderer.render(scene, camera);
}

clock = new THREE.Clock();

document.getElementById('start-btn').onclick = startGame;
document.getElementById('launch-btn').onclick = launchToNewPlanet;
</script>
</body>
</html>
